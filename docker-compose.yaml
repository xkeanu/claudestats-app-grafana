services:
  grafana:
    image: grafana/grafana:12.3.1
    container_name: claudestats-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./dist:/var/lib/grafana/plugins/timurdigital-claudestats-app
      - ./provisioning:/etc/grafana/provisioning
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=timurdigital-claudestats-app
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    depends_on:
      - prometheus
    restart: unless-stopped

  # OpenTelemetry Collector - receives OTLP data from Claude Code
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: claudestats-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped

  # Prometheus - stores metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: claudestats-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=native-histograms'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  grafana-storage:
  prometheus-data:
